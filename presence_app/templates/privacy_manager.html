{% load static %}

<div class="privacy-fixed-wrapper" aria-hidden="false">
    <form id="privacyForm" action="{% url 'privacy_update' %}" method="post" class="privacy-panel">
        {% csrf_token %}
        {% with profile=request.user.profile %}
        <input type="hidden" id="privacy_level_input" name="privacy_level" value="{{ profile.privacy_level }}">

        <div class="privacy-center">
            <h2 class="privacy-heading">Location Privacy</h2>
            <p class="privacy-sub">Who can see your location?</p>

            <nav class="privacy-options" role="tablist" aria-label="Privacy options">
                <label class="privacy-option-card" tabindex="0">
                    <input type="radio" name="privacy_level" value="{{ profile.PRIVACY_PUBLIC }}" class="privacy-radio" data-privacy-name="Everyone">
                    <span class="privacy-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="9"></circle>
                            <path d="M3 12h18"></path>
                            <path d="M12 3a14 14 0 0 1 0 18"></path>
                            <path d="M12 3a14 14 0 0 0 0 18"></path>
                        </svg>
                    </span>
                    <span class="privacy-option-label">Everyone</span>
                </label>

                <label class="privacy-option-card" tabindex="0">
                    <input type="radio" name="privacy_level" value="{{ profile.PRIVACY_FRIENDS_ONLY }}" class="privacy-radio" data-privacy-name="Custom">
                    <span class="privacy-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                            <circle cx="8.5" cy="7" r="3"></circle>
                            <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                            <path d="M16 3.13a3 3 0 0 1 0 5.75"></path>
                        </svg>
                    </span>
                    <span class="privacy-option-label">Custom</span>
                </label>

                <label class="privacy-option-card" tabindex="0">
                    <input type="radio" name="privacy_level" value="{{ profile.PRIVACY_ONLY_ME }}" class="privacy-radio" data-privacy-name="Only Me">
                    <span class="privacy-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="10" rx="2"></rect>
                            <path d="M7 11V8a5 5 0 0 1 10 0v3"></path>
                        </svg>
                    </span>
                    <span class="privacy-option-label">Only Me</span>
                </label>
            </nav>

            <div class="privacy-search-wrap" id="privacySearchContainer" style="display: none;">
                <input
                    id="peerSearchBox"
                    type="text"
                    class="privacy-search-input"
                    placeholder="Search by username (e.g., Cjade)..."
                    aria-label="Search peers"
                >
                <button type="button" class="privacy-search-btn" id="searchBtnId" title="Search">Search</button>
            </div>

            <div id="allowedFriendsContainer" style="display: none; margin-top: 1.5rem;">
                <h3 style="color: #fff; font-size: 0.95rem; margin-bottom: 1rem;">Friends with Access:</h3>
                <div id="allowedFriendsList" style="background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; max-height: 200px; overflow-y: auto; padding: 0.5rem;">
                    <p style="color: var(--text-muted); text-align: center; padding: 1rem;">No friends have access yet</p>
                </div>
            </div>

            <div id="searchResultsContainer" style="display: none; margin-top: 1.5rem;">
                <div id="searchResultsList" style="background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; max-height: 200px; overflow-y: auto;"></div>
            </div>
        </div>
        {% endwith %}
    </form>
</div>

<script>
(function(){
    const hidden = document.getElementById('privacy_level_input');
    const radios = document.querySelectorAll('.privacy-radio');
    const cards = document.querySelectorAll('.privacy-option-card');
    const searchContainer = document.getElementById('privacySearchContainer');
    const allowedContainer = document.getElementById('allowedFriendsContainer');
    const form = document.getElementById('privacyForm');
    const searchBox = document.getElementById('peerSearchBox');
    const searchBtn = document.getElementById('searchBtnId');
    const searchResultsContainer = document.getElementById('searchResultsContainer');
    const searchResultsList = document.getElementById('searchResultsList');
    const allowedFriendsList = document.getElementById('allowedFriendsList');

    if (form) {
        form.addEventListener('submit', (e) => e.preventDefault());
    }

    if (searchBtn) {
        searchBtn.addEventListener('click', function(e) {
            e.preventDefault();
            performSearch();
            return false;
        });
    }

    function updateUI(){
        radios.forEach(r => r.checked = r.value === hidden.value);
        cards.forEach(card => {
            const cardRadio = card.querySelector('.privacy-radio');
            card.classList.toggle('selected', Boolean(cardRadio && cardRadio.checked));
        });

        const customRadio = Array.from(radios).find(r => r.dataset.privacyName === 'Custom');
        if (customRadio && customRadio.checked) {
            searchContainer.style.display = 'flex';
            allowedContainer.style.display = 'block';
            loadAllowedFriends();
        } else {
            searchContainer.style.display = 'none';
            allowedContainer.style.display = 'none';
            searchResultsContainer.style.display = 'none';
        }
    }
    updateUI();

    function loadAllowedFriends(){
        fetch('/api/privacy/allowed-friends/')
            .then(res => res.json())
            .then(data => {
                if (data.success === false) {
                    createToast('error', 'Error', data.message || 'Could not load friends.');
                    return;
                }

                if (data.allowed_friends && data.allowed_friends.length > 0) {
                    allowedFriendsList.innerHTML = data.allowed_friends.map(friend => `
                        <div style="padding: 0.7rem; border-bottom: 1px solid rgba(255,255,255,0.04); display: flex; justify-content: space-between; align-items: center;">
                            <span style="color: #e6e6e6; font-size: 0.9rem;">${friend.username}</span>
                            <button type="button" class="remove-friend-btn" data-friend-id="${friend.id}" style="background: rgba(220,53,69,0.2); color: #dc3545; border: none; padding: 0.3rem 0.8rem; border-radius: 4px; font-size: 0.8rem; cursor: pointer;">Remove</button>
                        </div>
                    `).join('');

                    document.querySelectorAll('.remove-friend-btn').forEach(btn => {
                        btn.addEventListener('click', (e) => removeFriend(e, btn.dataset.friendId));
                    });
                } else {
                    allowedFriendsList.innerHTML = '<p style="color: var(--text-muted); text-align: center; padding: 1rem;">No friends have access yet</p>';
                }
            })
            .catch(err => createToast('error', 'Error', err.message || 'Could not load friends.'));
    }

    function removeFriend(e, friendId){
        e.preventDefault();
        fetch('/api/privacy/remove-friend/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': getCSRFToken(),
                'X-Requested-With': 'XMLHttpRequest'
            },
            body: JSON.stringify({friend_id: friendId})
        })
        .then(res => res.json())
        .then(data => {
            if (data.success) {
                createToast('success', 'Done', data.message || 'Removed.');
                loadAllowedFriends();
                return;
            }
            createToast('error', 'Error', data.message || 'Could not remove friend.');
        })
        .catch(err => createToast('error', 'Error', err.message || 'Could not remove friend.'));
    }

    function addFriend(friendId){
        fetch('/api/privacy/add-friend/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': getCSRFToken(),
                'X-Requested-With': 'XMLHttpRequest'
            },
            body: JSON.stringify({friend_id: friendId})
        })
        .then(res => res.json())
        .then(data => {
            if (data.success) {
                createToast('success', 'Done', data.message || 'Added.');
                loadAllowedFriends();
                searchBox.value = '';
                searchResultsContainer.style.display = 'none';
                return;
            }
            createToast('error', 'Error', data.message || 'Could not add friend.');
        })
        .catch(err => createToast('error', 'Error', err.message || 'Could not add friend.'));
    }

    function performSearch(){
        const query = searchBox.value.trim();
        if (!query) return;

        fetch(`/api/search/peers/?q=${encodeURIComponent(query)}`)
            .then(res => res.json())
            .then(data => {
                if (data.results && data.results.length > 0) {
                    searchResultsList.innerHTML = data.results.map(user => `
                        <div style="padding: 0.7rem; border-bottom: 1px solid rgba(255,255,255,0.04); display: flex; justify-content: space-between; align-items: center;">
                            <span style="color: #e6e6e6; font-size: 0.9rem;">${user.username}</span>
                            <button type="button" class="add-friend-btn" data-friend-id="${user.id}" style="background: rgba(76,175,80,0.2); color: #4caf50; border: none; padding: 0.3rem 0.8rem; border-radius: 4px; font-size: 0.8rem; cursor: pointer;">Add</button>
                        </div>
                    `).join('');

                    document.querySelectorAll('.add-friend-btn').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            e.preventDefault();
                            addFriend(btn.dataset.friendId);
                        });
                    });
                    searchResultsContainer.style.display = 'block';
                } else {
                    searchResultsList.innerHTML = '<p style="color: var(--text-muted); text-align: center; padding: 1rem;">No users found</p>';
                    searchResultsContainer.style.display = 'block';
                }
            })
            .catch(err => createToast('error', 'Error', err.message || 'Search failed.'));
    }

    if (searchBox) {
        searchBox.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                performSearch();
                return false;
            }
        });
    }

    cards.forEach(card => {
        card.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                const radio = card.querySelector('.privacy-radio');
                if (radio) {
                    radio.checked = true;
                    radio.dispatchEvent(new Event('change', { bubbles: true }));
                }
            }
        });
    });

    radios.forEach(r => r.addEventListener('change', function(){
        hidden.value = this.value;
        updateUI();

        fetch(form.action, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': getCSRFToken(),
                'X-Requested-With': 'XMLHttpRequest'
            },
            body: JSON.stringify({ privacy_level: hidden.value })
        })
        .then(res => res.json().then(data => ({ ok: res.ok, data })))
        .then(({ ok, data }) => {
            if (!ok || !data.success) {
                createToast('error', 'Error', data.message || 'Could not update privacy.');
                return;
            }
            createToast('success', 'Done', data.message || 'Privacy updated.');
        })
        .catch(error => createToast('error', 'Error', error.message || 'Could not update privacy.'));
    }));
})();
</script>
