{% load static %}

<div class="instructor-privacy-fixed-wrapper" aria-hidden="false">
    <form id="instructorPrivacyForm" action="{% url 'instructor_privacy_update' %}" method="post" class="instructor-privacy-panel">
        {% csrf_token %}
        {% with profile=request.user.profile %}

        <div style="margin-top: 24px;">
          <p style="font-size: 13px; font-weight: 500; color: #fff; margin-bottom: 4px;">Location Privacy</p>
          <p style="font-size: 12px; color: rgba(255,255,255,0.45); margin-bottom: 12px;">Who can see your location when searching for instructors?</p>
          <div id="privacy-toggle" style="display: inline-flex; background: rgba(255,255,255,0.08); border-radius: 20px; padding: 3px; position: relative;">
            <div id="privacy-slider" style="position: absolute; top: 3px; left: 3px; height: calc(100% - 6px); background: rgba(255,255,255,0.18); border-radius: 16px; transition: all 0.25s cubic-bezier(0.25, 0.8, 0.5, 1); z-index: 0;"></div>
            <button id="btn-everyone" type="button" onclick="setPrivacy('everyone')" style="position: relative; z-index: 1; border: none; background: transparent; color: #fff; border-radius: 16px; padding: 6px 22px; font-size: 13px; font-weight: 500; cursor: pointer; transition: color 0.25s;">Everyone</button>
            <button id="btn-none" type="button" onclick="setPrivacy('none')" style="position: relative; z-index: 1; border: none; background: transparent; color: rgba(255,255,255,0.4); border-radius: 16px; padding: 6px 22px; font-size: 13px; font-weight: 500; cursor: pointer; transition: color 0.25s;">None</button>
          </div>
          <input type="hidden" name="instructor_visibility" id="privacy-value" value="{{ profile.instructor_visibility|default:'everyone' }}">
        </div>
        {% endwith %}
    </form>
</div>

<style>
    .instructor-privacy-fixed-wrapper {
        margin-bottom: 2rem;
    }

    .instructor-privacy-panel {
        background: rgba(15, 23, 42, 0.8);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 16px;
        padding: 1.5rem;
    }

    @media (max-width: 600px) {
        .instructor-privacy-panel {
            padding: 1.5rem;
        }
    }
</style>

<script>
function updatePrivacyUI(val) {
  const slider = document.getElementById('privacy-slider');
  const btnE = document.getElementById('btn-everyone');
  const btnN = document.getElementById('btn-none');
  const input = document.getElementById('privacy-value');

  if (!slider || !btnE || !btnN || !input) return;

  input.value = val;
  if (val === 'everyone') {
    slider.style.left = '3px';
    slider.style.width = btnE.offsetWidth + 'px';
    btnE.style.color = '#fff';
    btnN.style.color = 'rgba(255,255,255,0.4)';
  } else {
    slider.style.left = (btnE.offsetWidth + 3) + 'px';
    slider.style.width = btnN.offsetWidth + 'px';
    btnE.style.color = 'rgba(255,255,255,0.4)';
    btnN.style.color = '#fff';
  }
}

function setPrivacy(val) {
  const form = document.getElementById('instructorPrivacyForm');
  updatePrivacyUI(val);
  if (!form) return;

  fetch(form.action, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'X-CSRFToken': getCSRFToken(),
      'X-Requested-With': 'XMLHttpRequest'
    },
    body: JSON.stringify({ instructor_visibility: val })
  })
  .then(res => res.json().then(data => ({ ok: res.ok, data })))
  .then(({ ok, data }) => {
    if (!ok || !data.success) {
      createToast('error', 'Error', (data && data.message) ? data.message : 'Could not update location privacy.');
      return;
    }
    createToast('success', 'Done', data.message || 'Location privacy updated.');
  })
  .catch(err => createToast('error', 'Error', err.message || 'Could not update location privacy.'));
}

window.addEventListener('load', () => {
  const input = document.getElementById('privacy-value');
  const val = (input && input.value) ? input.value : 'everyone';
  updatePrivacyUI(val);
});
</script>
